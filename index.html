<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOPPING // SYS_MARKET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --bg:     #080608;
    --amber:  #ffb300;
    --orange: #ff6a00;
    --red:    #ff3366;
    --purple: #cc44ff;
    --magenta:#ff00cc;
    --white:  #f0f0f0;
    --dim:    rgba(255,255,255,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* scanlines — tonos ámbar en lugar de cian */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(255,179,0,0.012) 3px, rgba(255,179,0,0.012) 4px
    );
    pointer-events: none; z-index: 1;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(4,2,8,0.8) 100%);
    pointer-events: none; z-index: 1;
  }

  canvas { position: fixed; inset: 0; z-index: 0; }

  /* ── STAGE ── */
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    width: 100%; max-width: 960px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.35rem 0.75rem;
    border: 1px solid rgba(255,179,0,0.12);
    background: rgba(255,179,0,0.02);
    margin-bottom: 2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.15em;
    color: var(--amber); opacity: 0.6;
  }

  .dot-live {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--amber);
    animation: blink 1.5s infinite;
    margin-right: 0.4rem; vertical-align: middle;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 1.5rem; }

  .glitch-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 7vw, 4.5rem);
    font-weight: 900;
    color: var(--white);
    position: relative;
    display: inline-block;
    line-height: 1;
    letter-spacing: 0.05em;
    text-shadow: 0 0 30px rgba(255,179,0,0.3);
  }

  .glitch-title::before {
    content: attr(data-text);
    position: absolute; inset: 0;
    color: var(--orange);
    animation: glitch1 4s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  }

  .glitch-title::after {
    content: attr(data-text);
    position: absolute; inset: 0;
    color: var(--red);
    animation: glitch2 4s infinite;
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  }

  @keyframes glitch1 {
    0%,88%,100% { transform: translate(0); opacity: 0; }
    90% { transform: translate(-4px,2px); opacity: 1; }
    92% { transform: translate(4px,-2px); opacity: 1; }
    94% { transform: translate(-2px,0); opacity: 1; }
    96% { transform: translate(0); opacity: 0; }
  }

  @keyframes glitch2 {
    0%,88%,100% { transform: translate(0); opacity: 0; }
    91% { transform: translate(4px,-1px); opacity: 1; }
    93% { transform: translate(-3px,2px); opacity: 1; }
    95% { transform: translate(0); opacity: 0; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--amber);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 0.6rem;
    opacity: 0.6;
  }

  /* ── NAV BUTTONS ── */
  .nav-buttons {
    display: flex; gap: 0.7rem;
    margin: 1.5rem 0 0;
    flex-wrap: wrap; justify-content: center;
  }

  .nav-btn {
    position: relative;
    background: transparent;
    border: 1px solid var(--purple);
    color: var(--purple);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.45rem;
    overflow: hidden; transition: color 0.25s;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }

  .nav-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--purple), var(--magenta));
    opacity: 0; transition: opacity 0.25s; z-index: 0;
  }

  .nav-btn::after {
    content: ''; position: absolute; left: 0; top: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, transparent, var(--magenta), transparent);
    transform: translateY(-100%);
  }

  .nav-btn:hover::after { transform: translateY(100%); transition: transform 0.4s ease; }
  .nav-btn:hover::before { opacity: 1; }
  .nav-btn:hover { color: var(--bg); box-shadow: 0 0 20px rgba(204,68,255,0.6), 0 0 40px rgba(204,68,255,0.2); }
  .nav-btn span { position: relative; z-index: 1; }

  .nav-btn .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--magenta); animation: blink 1.8s infinite;
    position: relative; z-index: 1; flex-shrink: 0;
  }

  /* ── GRID ── */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.25rem;
    max-width: 960px; width: 100%;
    margin-top: 2.5rem;
  }

  /* ── CARD WRAPPER ── */
  .card-wrapper {
    display: flex; flex-direction: column;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,179,0,0.1);
    border-radius: 3px 3px 0 0;
    padding: 1.4rem;
    position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.3s;
    cursor: pointer; flex: 1;
  }

  .card-wrapper.no-stock .product-card {
    border-color: rgba(255,51,102,0.15);
    opacity: 0.6;
  }

  .card-wrapper.no-link .product-card { border-radius: 3px; }

  .product-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--amber) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.3s;
  }

  .product-card:hover::before { opacity: 0.05; }
  .product-card:hover { border-color: var(--amber); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,179,0,0.1); }

  .product-card.revealed {
    border-color: var(--amber);
    background: rgba(255,179,0,0.03);
  }

  .product-card.revealed::before { opacity: 0.07; }

  /* card top row */
  .card-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 0.9rem;
  }

  .card-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.2em;
    color: var(--amber); opacity: 0.5;
  }

  /* stock badge */
  .stock-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.15em;
    padding: 2px 7px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .stock-badge.in-stock {
    color: #00ff88; border-color: rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.05);
  }

  .stock-badge.low-stock {
    color: var(--amber); border-color: rgba(255,179,0,0.3);
    background: rgba(255,179,0,0.05);
    animation: blink 2s infinite;
  }

  .stock-badge.no-stock {
    color: var(--red); border-color: rgba(255,51,102,0.3);
    background: rgba(255,51,102,0.05);
  }

  /* product name */
  .product-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem; font-weight: 700;
    color: var(--white);
    margin-bottom: 0.5rem;
    line-height: 1.3;
    letter-spacing: 0.03em;
  }

  /* description */
  .product-desc {
    font-size: 0.8rem; line-height: 1.65;
    color: var(--dim);
    margin-bottom: 1rem;
  }

  /* price + stock row */
  .product-meta {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: auto;
    padding-top: 0.8rem;
    border-top: 1px solid rgba(255,179,0,0.08);
  }

  .product-price {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 700;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255,179,0,0.4);
  }

  .product-stock-qty {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
  }

  /* ── ORDER BUTTON (hermano de card) ── */
  .order-btn {
    display: none;
    width: 100%;
    background: transparent;
    border: 1px solid var(--amber);
    border-top: none;
    border-radius: 0 0 3px 3px;
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 11px 16px;
    cursor: pointer; text-align: left;
    transition: background 0.2s, color 0.2s;
    animation: slideDown 0.25s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .order-btn:hover {
    background: var(--amber);
    color: var(--bg);
  }

  .order-btn.whatsapp::before {
    content: '◉ ';
    opacity: 0.6;
  }

  /* reveal trigger */
  .card-wrapper.has-link .product-card.revealed ~ .order-btn { display: block; }
  .card-wrapper.no-stock .order-btn { display: none !important; }

  /* ── COUNTER / FOOTER ── */
  .sys-footer {
    margin-top: 3rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15);
    text-align: center;
  }

  /* ── ANIMS ── */
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* chaos shake */
  body.chaos .glitch-title { animation: shake 0.1s infinite; }

  @keyframes shake {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(-2px,1px) rotate(-0.4deg); }
    50%  { transform: translate(2px,-1px) rotate(0.4deg); }
    75%  { transform: translate(-1px,2px) rotate(-0.2deg); }
  }

  body.chaos .product-card { animation: cardShake 0.15s infinite; }

  @keyframes cardShake {
    0%,100% { transform: translate(0,0); }
    33%     { transform: translate(1px,-1px); }
    66%     { transform: translate(-1px,1px); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="stage">

  <!-- STATUS BAR -->
  <div class="status-bar" style="max-width:960px;width:100%">
    <span><span class="dot-live"></span>SYS_MARKET · ONLINE</span>
    <span id="clock">--:--:--</span>
    <span>CATALOG · v1.0</span>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="glitch-title" data-text="EN CONSTRUCCIÓN">💻EN CONSTRUCCIÓN⚠️</div>
    <div class="subtitle">// catálogo de productos · haz clic en una tarjeta para ordenar</div>

    <!-- NAV BUTTONS -->
    <div class="nav-buttons">
      <a class="nav-btn" href="https://baphomet1984.github.io/fail-news/">
        <span class="dot"></span><span>Bitácora</span>
      </a>
      <a class="nav-btn" href="https://baphomet1984.github.io/systemtag/gate/?lvl=core&go=signal-core">
        <span class="dot"></span><span>S.Core</span>
      </a>
      <a class="nav-btn" href="https://baphomet1984.github.io/alliados/">
        <span class="dot"></span><span>Aliados</span>
      </a>
    </div>
  </div>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="grid"></div>

  <div class="sys-footer">
    SYS_MARKET · hub.uplink · pedidos vía whatsapp · precios sujetos a cambio sin previo aviso
  </div>

</div>

<script>
// ── CANVAS — fondo ámbar/naranja, diferente a Fail News ──────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initRain(); });

// partículas ámbar/naranja/rojo
const particles = Array.from({length: 110}, () => mkP({}));
function mkP(p) {
  p.x = Math.random() * (W||innerWidth);
  p.y = Math.random() * (H||innerHeight);
  p.size   = Math.random() * 1.4 + 0.2;
  p.vy     = -(Math.random() * 0.45 + 0.1);
  p.vx     = (Math.random() - 0.5) * 0.18;
  p.opacity = Math.random() * 0.45 + 0.08;
  const r  = Math.random();
  p.color  = r > 0.6 ? '#ffb300' : r > 0.35 ? '#ff6a00' : '#ff3366';
  return p;
}

// lluvia — chars en ámbar
const COL = 22;
let cols, drops;
function initRain() {
  cols  = Math.floor((W||innerWidth) / COL);
  drops = Array.from({length: cols}, () => Math.random() * -150);
}
initRain();
const RC = '¥$€₿01アカサタ{}[]<>\\;:!@#%&*~';

let frame = 0;
function draw() {
  ctx.clearRect(0, 0, W, H);

  // grid ámbar
  ctx.strokeStyle = 'rgba(255,179,0,0.025)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 55) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 55) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // lluvia ámbar
  if (frame % 2 === 0) {
    ctx.font = `10px "Share Tech Mono", monospace`;
    drops.forEach((y, i) => {
      const ch = RC[Math.floor(Math.random() * RC.length)];
      ctx.globalAlpha = 0.45; ctx.fillStyle = '#ffb300';
      ctx.fillText(ch, i * COL, y);
      ctx.globalAlpha = 0.05;
      ctx.fillText(RC[Math.floor(Math.random() * RC.length)], i * COL, y - COL);
      drops[i] = y > H + 40 ? Math.random() * -180 : y + (Math.random() * 1.1 + 0.4);
    });
  }

  // partículas
  particles.forEach(p => {
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle   = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
    p.x += p.vx; p.y += p.vy; p.opacity -= 0.0007;
    if (p.y < -5 || p.opacity <= 0) { mkP(p); p.y = H; }
  });

  // brackets naranjas en esquinas
  const corners = [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]];
  ctx.globalAlpha = 0.18; ctx.lineWidth = 1.5;
  corners.forEach(([cx,cy,dx,dy]) => {
    ctx.strokeStyle = '#ff6a00';
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+dx*70,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy+dy*70); ctx.stroke();
  });

  ctx.globalAlpha = 1;
  frame++;
  requestAnimationFrame(draw);
}
draw();

// ── CLOCK ────────────────────────────────────────────────────────
function tick() { document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }
setInterval(tick, 1000); tick();

// ── PRODUCTOS — edita aquí tu catálogo ───────────────────────────
const WA_URL = 'https://chat.whatsapp.com/D7xEqrGxJgABFHbRQXM6tg?mode=gi_t'; // ← cambia por tu link

const products = [
  {
    id:    'ITEM-001',
    name:  'Producto Ejemplo 01',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$250 MXN',
    stock: 12,
    color: '#ffb300'
  },
  {
    id:    'ITEM-002',
    name:  'Producto Ejemplo 02',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$480 MXN',
    stock: 3,
    color: '#ff6a00'
  },
  {
    id:    'ITEM-003',
    name:  'Producto Ejemplo 03',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$1,200 MXN',
    stock: 0,
    color: '#ff3366'
  },
  {
    id:    'ITEM-004',
    name:  'Producto Ejemplo 04',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$350 MXN',
    stock: 8,
    color: '#ffb300'
  },
  {
    id:    'ITEM-005',
    name:  'Producto Ejemplo 05',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$790 MXN',
    stock: 1,
    color: '#ff6a00'
  },
  {
    id:    'ITEM-006',
    name:  'Producto Ejemplo 06',
    desc:  'Descripción breve del producto. Características principales, material, uso recomendado.',
    price: '$160 MXN',
    stock: 20,
    color: '#ffb300'
  }
];

// ── RENDER ───────────────────────────────────────────────────────
const grid = document.getElementById('grid');

products.forEach(product => {
  const outOfStock = product.stock === 0;
  const lowStock   = product.stock > 0 && product.stock <= 3;
  const hasLink    = !outOfStock;

  // stock badge
  const badgeClass = outOfStock ? 'no-stock' : lowStock ? 'low-stock' : 'in-stock';
  const badgeText  = outOfStock ? 'SIN STOCK' : lowStock ? `ÚLTIMAS ${product.stock}` : `STOCK: ${product.stock}`;

  // wrapper
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper' +
    (hasLink    ? ' has-link'  : ' no-link') +
    (outOfStock ? ' no-stock'  : '');

  // tarjeta
  const card = document.createElement('div');
  card.className = 'product-card';
  card.style.setProperty('--card-color', product.color);
  card.innerHTML = `
    <div class="card-top">
      <span class="card-id">${product.id}</span>
      <span class="stock-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="product-name">${product.name}</div>
    <div class="product-desc">${product.desc}</div>
    <div class="product-meta">
      <span class="product-price">${product.price}</span>
      <span class="product-stock-qty">// unidades disponibles</span>
    </div>
  `;

  // botón de pedido
  const btn = document.createElement('button');
  btn.className = 'order-btn whatsapp';
  btn.style.setProperty('--amber', product.color);
  btn.style.borderColor   = product.color;
  btn.style.color         = product.color;
  btn.textContent = `ORDENAR → ${product.name}`;

  // click tarjeta → revela
  card.addEventListener('click', function() {
    if (outOfStock) return;
    card.classList.toggle('revealed');
  });

  // click botón → WhatsApp
  btn.addEventListener('click', function() {
    const msg = encodeURIComponent(
      `Hola! Me interesa ordenar:\n\n` +
      `🛒 ${product.name}\n` +
      `🔖 ID: ${product.id}\n` +
      `💰 Precio: ${product.price}\n\n` +
      `¿Está disponible?`
    );
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  });

  wrapper.appendChild(card);
  if (hasLink) wrapper.appendChild(btn);
  grid.appendChild(wrapper);
});
</script>
</body>
</html>
